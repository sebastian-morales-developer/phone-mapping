<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Phone Mapping V1 Viewer</title>
    <link rel="stylesheet" href="/css/viewer.css" />
    <script type="importmap">
      {
        "imports": {
          "three": "https://unpkg.com/three@0.166.1/build/three.module.js",
          "three/addons/": "https://unpkg.com/three@0.166.1/examples/jsm/"
        }
      }
    </script>
  </head>
  <body>
    <div id="viewerRoot">
      <header id="viewerHeader">
        <div class="viewer-header-side">
          <a id="backLink" href="/">Back</a>
          <div>
            <h1 id="viewerTitle">3D Viewer</h1>
            <p id="viewerSubtitle">Loading model</p>
          </div>
        </div>

        <div class="viewer-logo-strip" aria-label="Artemis Phone Mapping">
          <img class="viewer-logo viewer-logo-artemis" src="/logos/artemis_logo.png" alt="Artemis" />
          <img
            class="viewer-logo viewer-logo-phone-mapping"
            src="/logos/artemis_phone_mapping_logo.png"
            alt="Artemis Phone Mapping"
          />
        </div>

        <div class="viewer-actions">
          <a id="orthophotosLink" href="#">Create Orthophotos</a>
          <a id="downloadLink" href="#" download>Download GLB</a>
        </div>
      </header>

      <main id="canvasWrap">
        <canvas id="viewerCanvas"></canvas>
        <div id="loadingPanel">Loading 3D model...</div>
      </main>
    </div>

    <script type="module" src="/js/viewer.js"></script>
  </body>
</html>
